<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Map - India</title>
    
    <!-- Leaflet CSS & JS (For the Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet MarkerCluster CSS & JS (To group thousands of dots cleanly) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #0f172a; color: white; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Floating UI Panels */
        .ui-panel {
            position: absolute; z-index: 1000; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(8px);
            border: 1px solid #334155; 
            border-radius: 0.75rem; 
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .filter-box { top: 1rem; left: 1rem; width: 280px; }
        .stats-box { top: 1rem; right: 1rem; width: 220px; }
        
        select, button {
            width: 100%; padding: 0.5rem; border-radius: 0.375rem; font-size: 0.875rem;
            background-color: #1e293b; color: white; border: 1px solid #475569; outline: none;
        }
        select:focus, button:focus { border-color: #3b82f6; }
        
        /* Custom Map Markers */
        .dc-marker { background-color: #ef4444; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; }
        .ac-marker { background-color: #3b82f6; border: 2px solid white; border-radius: 50%; width: 10px; height: 10px; }
        
        /* Fix Leaflet popup styling for dark mode */
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 0.5rem; border: 1px solid #475569; }
        .leaflet-popup-tip { background: #1e293b; }
        .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    </style>
</head>
<body>

    <!-- The Map Container -->
    <div id="map"></div>

    <!-- Left Side: Filters -->
    <div class="ui-panel filter-box">
        <h2 class="text-lg font-bold text-blue-400 mb-3 flex items-center gap-2">⚡ EV Map India</h2>
        
        <label class="text-xs text-slate-400 block mb-1">CHARGER TYPE</label>
        <select id="filter-type" onchange="applyFilters()">
            <option value="all">All Types</option>
            <option value="dc">DC Fast (>20kW)</option>
            <option value="ac">AC Slow/Medium</option>
        </select>

        <label class="text-xs text-slate-400 block mb-1 mt-3">OPERATOR NETWORK</label>
        <select id="filter-operator" onchange="applyFilters()">
            <option value="all">All Operators</option>
        </select>

        <button onclick="resetFilters()" class="mt-3 bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold transition">
            Reset Filters
        </button>
    </div>

    <!-- Right Side: Stats -->
    <div class="ui-panel stats-box">
        <p class="text-xs text-slate-400 uppercase">Showing on Map</p>
        <p id="stat-count" class="text-2xl font-bold text-green-400">0</p>
        <p class="text-xs text-slate-400 mt-2">Total Plugs Available</p>
        <p id="stat-plugs" class="text-lg font-bold text-yellow-400">0</p>
        <div class="mt-3 flex items-center gap-2 text-xs">
            <span class="w-3 h-3 bg-red-500 rounded-full inline-block"></span> DC Fast
            <span class="w-3 h-3 bg-blue-500 rounded-full inline-block ml-2"></span> AC Slow
        </div>
    </div>

    <script>
        let allStations = [];
        let map, markers;

        // 1. Initialize Map centered on India
        function initMap() {
            map = L.map('map').setView([20.5937, 78.9629], 5); // Center of India
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                maxZoom: 19
            }).addTo(map);

            // Initialize Marker Clusterer
            markers = L.markerClusterGroup({
                maxClusterRadius: 50,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                iconCreateFunction: function(cluster) {
                    return L.divIcon({ html: '<div style="background:rgba(59, 130, 246, 0.8); color:white; padding:5px 10px; border-radius:20px; font-weight:bold;">' + cluster.getChildCount() + '</div>', className: '', iconSize: L.point(40, 30) });
                }
            }).addTo(map);
        }

        // 2. Fetch Data from our Python Backend
        async function loadData() {
            try {
                let res = await fetch('/api/data');
                let data = await res.json();
                if (Array.isArray(data)) {
                    allStations = data;
                    populateOperatorFilter(data);
                    applyFilters();
                }
            } catch (e) {
                console.error("Failed to load data", e);
                // Retry in 5 seconds if backend is waking up
                setTimeout(loadData, 5000);
            }
        }

        // 3. Dynamically fill the Operator Dropdown
        function populateOperatorFilter(data) {
            let operators = new Set();
            data.forEach(s => { if(s.OperatorInfo?.Title) operators.add(s.OperatorInfo.Title); });
            let sorted = Array.from(operators).sort();
            let select = document.getElementById('filter-operator');
            sorted.forEach(op => {
                let opt = document.createElement('option');
                opt.value = op; opt.innerText = op;
                select.appendChild(opt);
            });
        }

        // 4. Apply Filters and Draw Markers
        function applyFilters() {
            let typeFilter = document.getElementById('filter-type').value;
            let opFilter = document.getElementById('filter-operator').value;

            // Clear existing markers
            markers.clearLayers();
            let visibleCount = 0;
            let plugCount = 0;

            allStations.forEach(station => {
                let lat = station.AddressInfo?.Latitude;
                let lng = station.AddressInfo?.Longitude;
                if (!lat || !lng) return; // Skip if no coordinates

                let operator = station.OperatorInfo?.Title || 'Unknown';
                if (opFilter !== 'all' && operator !== opFilter) return;

                // Determine if it has DC or AC
                let hasDC = false;
                let plugs = station.Connections || [];
                
                plugs.forEach(c => {
                    plugCount++;
                    if (c.LevelID === 3 || (c.PowerKW && c.PowerKW > 20)) hasDC = true;
                });

                if (typeFilter === 'dc' && !hasDC) return;
                if (typeFilter === 'ac' && hasDC) return;

                // Create Marker
                let iconHtml = hasDC ? '<div class="dc-marker"></div>' : '<div class="ac-marker"></div>';
                let icon = L.divIcon({ html: iconHtml, className: '', iconSize: hasDC ? [14, 14] : [10, 10] });

                let marker = L.marker([lat, lng], { icon: icon });
                
                // Create Popup Content (Like PlugShare)
                let popupContent = `
                    <div style="min-width: 200px;">
                        <h3 style="font-size:15px; font-weight:bold; margin-bottom:5px; color:#60a5fa;">${station.AddressInfo?.Title || 'Unknown Station'}</h3>
                        <p style="color:#94a3b8; font-size:12px; margin-bottom:8px;">${station.AddressInfo?.AddressLine1 || ''}, ${station.AddressInfo?.StateOrProvince || ''}</p>
                        <div style="background:#0f172a; padding:8px; border-radius:4px; margin-bottom:4px; display:flex; justify-content:space-between;">
                            <span style="color:#cbd5e1">Network:</span> <span style="color:white; font-weight:bold;">${operator}</span>
                        </div>
                        <div style="background:#0f172a; padding:8px; border-radius:4px; display:flex; justify-content:space-between;">
                            <span style="color:#cbd5e1">Plugs:</span> <span style="color:${hasDC ? '#ef4444' : '#3b82f6'}; font-weight:bold;">${plugs.length}x ${hasDC ? 'DC Fast' : 'AC'}</span>
                        </div>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markers.addLayer(marker);
                visibleCount++;
            });

            // Update Stats UI
            document.getElementById('stat-count').innerText = visibleCount;
            document.getElementById('stat-plugs').innerText = plugCount;
        }

        function resetFilters() {
            document.getElementById('filter-type').value = 'all';
            document.getElementById('filter-operator').value = 'all';
            applyFilters();
        }

        // Start App
        initMap();
        loadData();

    </script>
</body>
</html>
